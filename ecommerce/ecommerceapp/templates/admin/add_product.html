{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>

    <!-- ADMIN LAYOUT (SIDEBAR) CSS -->
    <link rel="stylesheet" href="{% static 'css/admin_header.css' %}">
    <link rel="stylesheet" href="{% static 'css/add_product.css' %}">
</head>

<script>
function previewImage(event) {
    const file = event.target.files[0];
    const preview = document.getElementById("imagePreview");
    const content = document.getElementById("uploadContent");

    if (file) {

        const allowedTypes = ["image/jpeg", "image/png", "image/jpg", "image/webp"];

        if (!allowedTypes.includes(file.type)) {
            alert("Only image files (JPG, PNG, WEBP) are allowed!");
            event.target.value = "";
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = "block";
            content.style.display = "none";
        };
        reader.readAsDataURL(file);
    }
}

document.addEventListener("DOMContentLoaded", function() {

    document.querySelector("form").addEventListener("submit", function(e) {

        const name = document.querySelector("input[name='name']").value.trim();
        const description = document.querySelector("textarea[name='description']").value.trim();
        const price = document.querySelector("input[name='price']").value.trim();

        const textRegex = /^[A-Za-z ]+$/;

        // Product Name validation
        if (!textRegex.test(name)) {
            alert("Product Name must contain only letters and spaces!");
            e.preventDefault();
            return;
        }

        // Description validation
        if (!textRegex.test(description)) {
            alert("Description must contain only letters and spaces!");
            e.preventDefault();
            return;
        }

        // Price validation (only integer)
        if (!Number.isInteger(Number(price)) || Number(price) <= 0) {
            alert("Price must be a positive integer value!");
            e.preventDefault();
            return;
        }
    });

});
</script>

<body>

{% include 'admin/header.html' %}

{% if messages %}
    {% for m in messages %}
        <script>alert("{{ m }}");</script>
    {% endfor %}
{% endif %}

<div class="main">

    <div class="topbar">
        <h3>Add Product</h3>
        <span class="badge">Administrator</span>
    </div>

    <div class="main-content">
        <div class="form-wrapper">
            <div class="form-card">
                <h2>Add New Product</h2>
                <p class="subtitle">Fill in the details below</p>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <!-- Image -->
                    <label>Product Image *</label>
                    <div class="upload-box">
                        <input type="file" name="image" accept="image/jpeg,image/png,image/webp"
                               required onchange="previewImage(event)">
                        <div class="upload-content" id="uploadContent">
                            <span>Choose product image</span>
                        </div>
                        <img id="imagePreview" style="display:none; max-width:150px;">
                    </div>

                    <!-- Product Name -->
                    <label>Product Name *</label>
                    <input type="text" name="name" required
                           pattern="[A-Za-z ]+"
                           title="Only letters and spaces allowed">

                    <!-- Description -->
                    <label>Description *</label>
                    <textarea name="description" required
                              title="Only letters and spaces allowed"></textarea>

                    <!-- Category -->
                    <label>Category *</label>
                    <select name="category" required>
                        <option value="">Select Category</option>
                        {% for cat in categories %}
                            <option value="{{ cat.0 }}">{{ cat.0 }}</option>
                        {% endfor %}
                    </select>

                    <!-- Price -->
                    <label>Price (₹) *</label>
                    <input type="number" name="price" required
                           step="1" min="1">

                    <div class="buttons">
                        <button type="reset" class="btn cancel">Cancel</button>
                        <button type="submit" class="btn save">Save Product</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
